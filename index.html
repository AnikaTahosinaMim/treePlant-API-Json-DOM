<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <main>
        <h1 class="text-3xl font-bold text-[#4ade80] text-center">Choose Your Trees</h1>
        <!-- all card section mother div -->
        <div class="grid grid-cols-1 sm:grid-cols-12 gap-8">
            <div class="shadow-2xl bg-white card card-body col-span-3">
                <h1 class="text-center text-2xl tetx-">Categories</h1>
                <div class="space-y-3 sticky top-8">
                    <button id="allTreeBtn" class="btn btn-primary w-full">All trees</button>
                    <!-- All cotagory container -->
                    <div id="catagory-container" class="space-y-3">
                        <!-- dynamic btn here -->

                    </div>
                </div>
            </div>
            <!-- tree card -->
            <div class="shadow-2xl bg-white card card-body col-span-6">
                <div id="treeContainer" class="grid grid-cols-1 gap-4 sm:grid-cols-3">
                    <!-- card -->
                    <!-- dynamicalily added -->
                </div>
                <div id="loadingscan" class="h-40  items-center hidden justify-center">
                    <span class="loading loading-dots loading-lg"></span>
                </div>
            </div>
            <div class="shadow-xl bg-white card card-body col-span-3">
                <h2 class="font-bold text-2xl mb-3">Your card</h2>
                <!-- <div class="space-y-3"> -->
                <div id="card-container">
                </div>
                <!-- emtep card -->
                 <div id="empty" class="text-center py-3">
                    <p class="text-sm font-medium">Your card is Empty</p>
                    <p class="text-sm font-medium">Add trees to get started</p>
                 </div>

                 <!-- totalprice -->
                <div class="flex justify-between mt-4 card items-center shadow-xl bg-white   p-5">
                    <h1 class="font-bold text-green-700 text-xl">total: </h1>
                    <p id="totalPrice" class="font-bold text-green-700 text-xl">$0</p>
                </div>

                <!-- </div> -->

            </div>
        </div>

        <!-- modal -->
        <!-- Open the modal using ID.showModal() method -->
        <button class="btn" onclick="tree-details-modal">open modal</button>
        <dialog id="tree-details-modal" class="modal">
            <div class="modal-box">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="font-bold text-2xl text-green-700" id="modalTitle">Tree Details</h3>
                    <button class="btn btn-sm btn-circle btn-ghost"
                        onclick="document.getElementById('tree-details-modal').close()">✕</button>
                </div>

                <div class=" gap-6">
                    <!-- Plant Image -->
                    <img id="modalImage" src="" alt="plant" class="w-full !h-[250px] object-cover rounded-lg mb-12">

                    <!-- Plant Details -->
                    <div class="">
                        <p class="text-sm text-gray-500 mb-2">
                            <span class="font-bold">Category:</span>
                            <span id="modalCategory" class="badge badge-primary"></span>
                        </p>
                        <p class="text-sm text-gray-600 mb-4">
                            <span id="modalDescription"></span>
                        </p>
                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="text-3xl font-bold text-green-600">$<span id="modalPrice">0</span></span>
                        </div>
                    </div>
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <!-- <button class="btn">Close</button> -->
                    </form>
                </div>
            </div>
        </dialog>
    </main>


    <script src="./script.js"></script>

</body>

</html>
